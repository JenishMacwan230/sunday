<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SUNDAY - AI Voice Assistant Desktop Widget" />
  <title>SUNDAY</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Ambient Background -->
  <div class="ambient-bg">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
  </div>

  <div id="widget" class="widget-expanded" aria-label="AI Assistant">

    <div id="expandedPanel" class="expanded-panel">
      <!-- Header -->
      <div class="panel-header">
        <div class="header-left">
          <div class="header-logo-mini">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
              <line x1="32" y1="4" x2="32" y2="13" stroke="url(#sunGrad2)" stroke-width="3" stroke-linecap="round" />
              <line x1="32" y1="51" x2="32" y2="60" stroke="url(#sunGrad2)" stroke-width="3" stroke-linecap="round" />
              <line x1="4" y1="32" x2="13" y2="32" stroke="url(#sunGrad2)" stroke-width="3" stroke-linecap="round" />
              <line x1="51" y1="32" x2="60" y2="32" stroke="url(#sunGrad2)" stroke-width="3" stroke-linecap="round" />
              <line x1="12" y1="12" x2="18" y2="18" stroke="url(#sunGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
              <line x1="46" y1="46" x2="52" y2="52" stroke="url(#sunGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
              <line x1="52" y1="12" x2="46" y2="18" stroke="url(#sunGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
              <line x1="18" y1="46" x2="12" y2="52" stroke="url(#sunGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
              <circle cx="32" cy="32" r="14" fill="url(#sunFaceGrad2)" />
              <path d="M25 29 Q27 26, 29 29" stroke="#5D4012" stroke-width="2.2" stroke-linecap="round" fill="none" />
              <path d="M35 29 Q37 26, 39 29" stroke="#5D4012" stroke-width="2.2" stroke-linecap="round" fill="none" />
              <path d="M25 35 Q32 42, 39 35" stroke="#5D4012" stroke-width="2.2" stroke-linecap="round" fill="none" />
              <defs>
                <linearGradient id="sunGrad2" x1="0" y1="0" x2="64" y2="64">
                  <stop offset="0%" stop-color="#FFD54F" />
                  <stop offset="100%" stop-color="#FF9800" />
                </linearGradient>
                <radialGradient id="sunFaceGrad2" cx="40%" cy="35%" r="55%">
                  <stop offset="0%" stop-color="#FFE082" />
                  <stop offset="60%" stop-color="#FFD54F" />
                  <stop offset="100%" stop-color="#FFB300" />
                </radialGradient>
              </defs>
            </svg>
          </div>
          <div>
            <h1 class="header-title">SUNDAY</h1>
            <p class="header-subtitle" id="headerSubtitle">AI Voice Assistant</p>
          </div>
        </div>
        <div class="header-right">
        </div>
      </div>

      <!-- Status Section -->
      <div class="status-section">
        <div class="status-badge" id="statusBadge">
          <span class="status-dot-live" id="statusDotLive"></span>
          <span class="status-text" id="statusText">Idle</span>
        </div>

        <div class="mode-toggle-container" id="modeToggleContainer">
          <button class="mode-btn active" id="btnManual" onclick="setMode('manual')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" x2="12" y1="19" y2="22" />
            </svg>
            Manual
          </button>
          <button class="mode-btn" id="btnWakeWord" onclick="setMode('wakeword')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 3-1.5 5-3.5 7.5L12 20" />
              <path d="M6 8.5C6 5.5 8.5 3 12 3" />
              <circle cx="12" cy="8.5" r="2" />
            </svg>
            Wake Word
          </button>
        </div>

        <div class="visualizer-container" id="visualizerContainer">
          <canvas id="visualizerCanvas" width="380" height="80"></canvas>
        </div>

        <div class="spoken-command-box" aria-live="polite">
          <p class="spoken-command-label">Heard command</p>
          <p class="spoken-command-text" id="spokenCommandText">Tap the mic and say your command...</p>
        </div>

        <div class="response-box" id="responseBox" aria-live="polite">
          <p class="response-label">Response</p>
          <div class="response-text" id="responseText">Waiting for your command...</div>
        </div>

        <button class="action-orb" id="actionOrb" onclick="toggleListening()">
          <div class="orb-ring"></div>
          <svg id="micIcon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" x2="12" y1="19" y2="22" />
          </svg>
          <svg id="stopIcon" class="hidden" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="6" width="12" height="12" rx="2" />
          </svg>
          <!-- Cooldown timer (hidden by default, replaces mic/stop during cooldown) -->
          <div id="cooldownTimer" class="cooldown-timer hidden">
            <svg class="cooldown-ring-svg" viewBox="0 0 64 64" width="56" height="56">
              <circle class="cooldown-ring-bg" cx="32" cy="32" r="28" fill="none" stroke-width="3" />
              <circle class="cooldown-ring" id="countdownRing" cx="32" cy="32" r="28" fill="none" stroke-width="3"
                stroke-linecap="round" transform="rotate(-90 32 32)" />
            </svg>
            <span class="countdown-number" id="countdownNumber">3</span>
          </div>
        </button>
      </div>

      <!-- Current Task Area -->
      <div class="current-task-section">
        <div class="current-task-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          <span>Current Task</span>
        </div>
        <div id="currentTaskArea" class="current-task-area"></div>
      </div>

      <!-- Quick Actions Footer -->
      <div class="panel-footer">
        <button class="quick-btn" onclick="toggleMute()" id="btnMute" title="Mute">
          <svg id="iconVolumeOn" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
          </svg>
          <svg id="iconVolumeOff" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <line x1="23" y1="9" x2="17" y2="15" />
            <line x1="17" y1="9" x2="23" y2="15" />
          </svg>
          <span>Mute</span>
        </button>
        <button class="quick-btn" onclick="togglePause()" id="btnPause" title="Pause">
          <svg id="iconPause" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="4" width="4" height="16" />
            <rect x="14" y="4" width="4" height="16" />
          </svg>
          <svg id="iconPlay" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          <span>Pause</span>
        </button>
        <button class="quick-btn" onclick="openAppPaths()" title="App Paths">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            <line x1="12" y1="11" x2="12" y2="17" />
            <line x1="9" y1="14" x2="15" y2="14" />
          </svg>
          <span>App Paths</span>
        </button>
      </div>
    </div>
  </div>

  <!-- App Paths Modal -->
  <div class="modal-overlay hidden" id="appPathsModal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">App Paths</h2>
        <button class="modal-close-btn" onclick="closeAppPaths()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <div class="modal-form">
        <div class="form-group">
          <label class="form-label" for="appName">App Name</label>
          <input class="form-input" type="text" id="appName" placeholder="e.g. Chrome, VS Code" />
        </div>
        <div class="form-group">
          <label class="form-label" for="appPath">Path / URL</label>
          <input class="form-input" type="text" id="appPath" placeholder="e.g. C:\\Program Files\\... or https://..." />
        </div>
        <div class="form-group">
          <label class="form-label">App Type</label>
          <div class="type-toggle">
            <button class="type-btn active" id="btnTypeSystem" onclick="setAppType('system')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                <line x1="8" y1="21" x2="16" y2="21" />
                <line x1="12" y1="17" x2="12" y2="21" />
              </svg>
              System App
            </button>
            <button class="type-btn" id="btnTypeWeb" onclick="setAppType('web')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
              </svg>
              Web App
            </button>
          </div>
        </div>
        <button class="add-path-btn" onclick="addAppPath()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Path
        </button>
      </div>

      <div class="modal-divider"></div>

      <div class="saved-paths-header">
        <span class="saved-paths-label">Saved Paths</span>
        <span class="saved-paths-count" id="pathCount">0</span>
      </div>
      <div class="saved-paths-list" id="savedPathsList">
        <div class="empty-state" id="emptyState">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          <p>No paths added yet</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ FIXED: app.js loads normally, resize runs in a SEPARATE script tag -->
  <script src="/eel.js"></script>
  <script src="app.js"></script>
  <script>
    window.addEventListener('load', function () {
      // Small delay lets Chrome finish painting the window before resizing
      setTimeout(function () {
        window.resizeTo(360, 650);
        window.moveTo(0, 0);
      }, 100);
    });
  </script>
</body>

</html>
